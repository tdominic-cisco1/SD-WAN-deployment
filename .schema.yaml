# SDWAN-as-code YAML schema
sdwan: include('sdwan', required=False)
defaults: any(required=False)
---
sdwan:
  manager_version: regex('^\d+(\.\d+)+$', required=False)
  management_ip_variable: regex('^[^"~`$&+,]{1,255}$', required=False)
  edge_feature_templates: include("edge_feature_templates", required=False)
  policy_objects: include("policy_objects", required=False)
  localized_policies: include("localized_policies", required=False)
  edge_device_templates: list(include("edge_device_templates"), required=False)
  sites: list(include("sites"), required=False)
  multi_region_fabric: include("multi_region_fabric", required=False)
  centralized_policies: include("centralized_policies", required=False)
  security_policies: include("security_policies", required=False)
  configuration_groups: list(include("configuration_group"), required=False)
  feature_profiles: include("feature_profiles", required=False)
  policy_groups: list(include("policy_group"), required=False)
# Edge Feature Templates
edge_feature_templates:
  aaa_templates: list(include("edge_feature_templates_aaa"), required=False)
  banner_templates: list(include("edge_feature_templates_banner"), required=False)
  bfd_templates: list(include("edge_feature_templates_bfd"), required=False)
  bgp_templates: list(include("edge_feature_templates_bgp"), required=False)
  cli_templates: list(include("edge_feature_templates_cli"), required=False)
  dhcp_server_templates: list(include("edge_feature_templates_dhcp_server"), required=False)
  ethernet_interface_templates: list(include("edge_feature_templates_ethernet_interface"), required=False)
  global_settings_templates: list(include("edge_feature_templates_global_settings"), required=False)
  igmp_templates: list(include("edge_feature_templates_igmp"), required=False)
  ipsec_interface_templates: list(include("edge_feature_templates_ipsec_interface"), required=False)
  logging_templates: list(include("edge_feature_templates_logging"), required=False)
  multicast_templates: list(include("edge_feature_templates_multicast"), required=False)
  ntp_templates: list(include("edge_feature_templates_ntp"), required=False)
  omp_templates: list(include("edge_feature_templates_omp"), required=False)
  ospf_templates: list(include("edge_feature_templates_ospf"), required=False)
  pim_templates: list(include("edge_feature_templates_pim"), required=False)
  secure_internet_gateway_templates: list(include("edge_feature_templates_secure_internet_gateway"), required=False)
  security_templates: list(include("edge_feature_templates_security"), required=False)
  sig_credentials_templates: list(include("edge_feature_templates_sig_credentials"), required=False)
  snmp_templates: list(include("edge_feature_templates_snmp"), required=False)
  svi_interface_templates: list(include("edge_feature_templates_svi_interface"), required=False)
  switchport_templates: list(include("edge_feature_templates_switchport"), required=False)
  system_templates: list(include("edge_feature_templates_system"), required=False)
  thousandeyes_templates: list(include("edge_feature_templates_thousandeyes"), required=False)
  vpn_templates: list(include("edge_feature_templates_vpn"), required=False)
  secure_app_hosting_templates: list(include("edge_feature_templates_secure_app_hosting"), required=False)
  gre_interface_templates: list(include("edge_feature_templates_gre_interface"), required=False)
  cellular_interface_templates: list(include("edge_feature_templates_cellular_interface"), required=False)
  cellular_controller_templates: list(include("edge_feature_templates_cellular_controller"), required=False)
  cellular_profile_templates: list(include("edge_feature_templates_cellular_profile"), required=False)
# WAN Edge device types
# edge_device_type: enum("ASR-1001-HX", "ASR-1001-X", "ASR-1002-HX", "ASR-1002-X", "ASR-1006-X", "C1101-4P", "C1101-4PLTEP", "C1101-4PLTEPW", "C1109-2PLTEGB", "C1109-2PLTEUS", "C1109-2PLTEVZ", "C1109-4PLTE2P", "C1109-4PLTE2PW", "C1111-4P", "C1111-4PLTEEA", "C1111-4PLTELA", "C1111-4PW", "C1111-8P", "C1111-8PLTEEA", "C1111-8PLTEEAW", "C1111-8PLTELA", "C1111-8PLTELAW", "C1111-8PW", "C1111X-8P", "C1112-8P", "C1112-8PLTEEA", "C1112-8PLTEEAWE", "C1112-8PWE", "C1113-8P", "C1113-8PLTEEA", "C1113-8PLTEEAW", "C1113-8PLTELA", "C1113-8PLTELAWZ", "C1113-8PLTEW", "C1113-8PM", "C1113-8PMLTEEA", "C1113-8PMWE", "C1113-8PW", "C1116-4P", "C1116-4PLTEEA", "C1116-4PLTEEAWE", "C1116-4PWE", "C1117-4P", "C1117-4PLTEEA", "C1117-4PLTEEAW", "C1117-4PLTELA", "C1117-4PLTELAWZ", "C1117-4PM", "C1117-4PMLTEEA", "C1117-4PMLTEEAWE", "C1117-4PMWE", "C1117-4PW", "C1118-8P", "C1121-4P", "C1121-4PLTEP", "C1121-8P", "C1121-8PLTEP", "C1121-8PLTEPW", "C1121X-8P", "C1121X-8PLTEP", "C1121X-8PLTEPW", "C1126-8PLTEP", "C1126X-8PLTEP", "C1127-8PLTEP", "C1127-8PMLTEP", "C1127X-8PLTEP", "C1127X-8PMLTEP", "C1128-8PLTEP", "C1131-8PLTEPW", "C1131-8PW", "C1131X-8PLTEPW", "C1131X-8PW", "C1161-8P", "C1161-8PLTEP", "C1161X-8P", "C1161X-8PLTEP", "C8000V", "C8200-1N-4T", "C8200L-1N-4T", "C8300-1N1S-4T2X", "C8300-1N1S-6T", "C8300-2N2S-4T2X", "C8300-2N2S-6T", "C8500-12X", "C8500-12X4QC", "C8500-20X6C", "C8500L-8S4X", "IR-1101", "IR-1821", "IR-1831", "IR-1833", "IR-1835", "IR-8140H", "IR-8140H-P", "IR-8340", "ISR-4221", "ISR-4221X", "ISR-4321", "ISR-4331", "ISR-4351", "ISR-4431", "ISR-4451-X", "ISR-4461", "ISR1100-4G-XE", "ISR1100-4GLTEGB-XE", "ISR1100-4GLTENA-XE", "ISR1100-6G-XE", "ISR1100X-4G-XE", "ISR1100X-6G-XE")
# AAA feature template
edge_feature_templates_aaa:
  name: regex('^[^<>!&" ]{1,128}$')
  description: str()
  device_types: list(enum("ASR-1001-HX", "ASR-1001-X", "ASR-1002-HX", "ASR-1002-X", "ASR-1006-X", "C1101-4P", "C1101-4PLTEP", "C1101-4PLTEPW", "C1109-2PLTEGB", "C1109-2PLTEUS", "C1109-2PLTEVZ", "C1109-4PLTE2P", "C1109-4PLTE2PW", "C1111-4P", "C1111-4PLTEEA", "C1111-4PLTELA", "C1111-4PW", "C1111-8P", "C1111-8PLTEEA", "C1111-8PLTEEAW", "C1111-8PLTELA", "C1111-8PLTELAW", "C1111-8PW", "C1111X-8P", "C1112-8P", "C1112-8PLTEEA", "C1112-8PLTEEAWE", "C1112-8PWE", "C1113-8P", "C1113-8PLTEEA", "C1113-8PLTEEAW", "C1113-8PLTELA", "C1113-8PLTELAWZ", "C1113-8PLTEW", "C1113-8PM", "C1113-8PMLTEEA", "C1113-8PMWE", "C1113-8PW", "C1116-4P", "C1116-4PLTEEA", "C1116-4PLTEEAWE", "C1116-4PWE", "C1117-4P", "C1117-4PLTEEA", "C1117-4PLTEEAW", "C1117-4PLTELA", "C1117-4PLTELAWZ", "C1117-4PM", "C1117-4PMLTEEA", "C1117-4PMLTEEAWE", "C1117-4PMWE", "C1117-4PW", "C1118-8P", "C1121-4P", "C1121-4PLTEP", "C1121-8P", "C1121-8PLTEP", "C1121-8PLTEPW", "C1121X-8P", "C1121X-8PLTEP", "C1121X-8PLTEPW", "C1126-8PLTEP", "C1126X-8PLTEP", "C1127-8PLTEP", "C1127-8PMLTEP", "C1127X-8PLTEP", "C1127X-8PMLTEP", "C1128-8PLTEP", "C1131-8PLTEPW", "C1131-8PW", "C1131X-8PLTEPW", "C1131X-8PW", "C1161-8P", "C1161-8PLTEP", "C1161X-8P", "C1161X-8PLTEP", "C8000V", "C8200-1N-4T", "C8200L-1N-4T", "C8300-1N1S-4T2X", "C8300-1N1S-6T", "C8300-2N2S-4T2X", "C8300-2N2S-6T", "C8500-12X", "C8500-12X4QC", "C8500-20X6C", "C8500L-8S4X", "IR-1101", "IR-1821", "IR-1831", "IR-1833", "IR-1835", "IR-8140H", "IR-8140H-P", "IR-8340", "ISR-4221", "ISR-4221X", "ISR-4321", "ISR-4331", "ISR-4351", "ISR-4431", "ISR-4451-X", "ISR-4461", "ISR1100-4G-XE", "ISR1100-4GLTEGB-XE", "ISR1100-4GLTENA-XE", "ISR1100-6G-XE", "ISR1100X-4G-XE", "ISR1100X-6G-XE"), min=1, required=False)
  accounting_rules: list(include("edge_feature_templates_aaa_accounting_rule"), required=False)
  authentication_and_authorization_order: list(str(), min=1)
  authorization_config_commands: bool(required=False)
  authorization_config_commands_variable: regex('^[^"~`$&+,]{1,255}$', required=False)
  authorization_console: bool(required=False)
  authorization_console_variable: regex('^[^"~`$&+,]{1,255}$', required=False)
