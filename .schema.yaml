  destination_ip_prefix: regex('^(?:((25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])\.){3}(25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])\/(?:[1-9]|[12]\d|3[0-2]))(?:\s+((25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])\.){3}(25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])\/(?:[1-9]|[12]\d|3[0-2]))*$', required=False)
  destination_ip_prefix_variable: str(required=False)
  destination_fqdn_lists: list(regex('^[A-Za-z0-9\-_]{1,32}$'), required=False)
  destination_fqdn: regex('^(?=.{1,120}$)((\*|[a-zA-Z0-9-]{1,63})\.)+([a-zA-Z0-9-]{2,63})$', required=False)
