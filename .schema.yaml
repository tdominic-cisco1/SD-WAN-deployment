  dot1x_authentication: bool(required=False)
  dot1x_authentication_variable: regex('^[^"~`$&+,]{1,255}$', required=False)
  dot1x_accounting: bool(required=False)
  dot1x_accounting_variable: regex('^[^"~`$&+,]{1,255}$', required=False)
  radius_dynamic_author: include("edge_feature_templates_aaa_radius_dynamic_author", required=False)
  radius_server_groups: list(include("edge_feature_templates_aaa_radius_server_group"), required=False)
  radius_trustsec: include("edge_feature_templates_aaa_radius_trustsec", required=False)
  tacacs_server_groups: list(include("edge_feature_templates_aaa_tacacs_server_group"), required=False)
  users: list(include("edge_feature_templates_aaa_user")) # At least the local user "admin" must be defined
edge_feature_templates_aaa_accounting_rule:
  method: enum("commands", "exec", "network", "system")
  privilege_level: enum(1, 15, required=False)
  start_stop: bool(required=False)
  start_stop_variable: regex('^[^"~`$&+,]{1,255}$', required=False)
  groups: list(str())
edge_feature_templates_aaa_authorization_rule:
  method: enum("commands")
  privilege_level: enum(1, 15)
  authenticated: bool()
  groups: list(str())
edge_feature_templates_aaa_radius_dynamic_author:
  domain_stripping: enum("yes", "no", "right-to-left", required=False)
  domain_stripping_variable: regex('^[^"~`$&+,]{1,255}$', required=False)
  authentication_type: enum("yes", "all", "session-key", required=False)
  authentication_type_variable: regex('^[^"~`$&+,]{1,255}$', required=False)
  port: int(min=0, max=65535, required=False)
  port_variable: regex('^[^"~`$&+,]{1,255}$', required=False)
  server_key: str(required=False)
  server_key_variable: regex('^[^"~`$&+,]{1,255}$', required=False)
  clients: list(include("edge_feature_templates_aaa_radius_dynamic_author_client"))
edge_feature_templates_aaa_radius_dynamic_author_client:
  ip: ip(version=4, required=False)
  ip_variable: regex('^[^"~`$&+,]{1,255}$', required=False)
  vpn_id: int(min=0, max=65530, required=False)
  vpn_id_variable: regex('^[^"~`$&+,]{1,255}$', required=False)
  server_key: str(required=False)
edge_feature_templates_aaa_radius_server_group:
  name: str(min=1, max=32)
  servers: list(include("edge_feature_templates_aaa_radius_server_group_server"))
  source_interface: str(required=False)
  source_interface_variable: regex('^[^"~`$&+,]{1,255}$', required=False)
  vpn_id: int(min=0, max=65530, required=False)
edge_feature_templates_aaa_radius_server_group_server:
  address: ip(version=4)
  authentication_port: int(min=1, max=65535, required=False)
  authentication_port_variable: regex('^[^"~`$&+,]{1,255}$', required=False)
  accounting_port: int(min=1, max=65535, required=False)
  accounting_port_variable: regex('^[^"~`$&+,]{1,255}$', required=False)
  timeout: int(min=1, max=1000, required=False)
  timeout_variable: regex('^[^"~`$&+,]{1,255}$', required=False)
  retransmit_count: int(min=1, max=100, required=False)
  retransmit_count_variable: regex('^[^"~`$&+,]{1,255}$', required=False)
  key_type: enum("key", "pac", required=False)
  key_type_variable: regex('^[^"~`$&+,]{1,255}$', required=False)
  key: str(starts_with="$CRYPT_CLUSTER$", min=1, max=128) # vManage-encrypted string
  secret_key: regex('^[0-9a-z]{1,150}$') # Type-7 encrypted secret
edge_feature_templates_aaa_radius_trustsec:
  cts_authorization_list: str(required=False)
  cts_authorization_list_variable: regex('^[^"~`$&+,]{1,255}$', required=False)
  server_group: str(min=1, max=32, required=False)
edge_feature_templates_aaa_tacacs_server_group:
  name: str(min=1, max=32)
  vpn_id: int(min=0, max=65530, required=False)
  source_interface: str(required=False)
  source_interface_variable: regex('^[^"~`$&+,]{1,255}$', required=False)
  servers: list(include("edge_feature_templates_aaa_tacacs_server_group_server"), min=1, max=8)
edge_feature_templates_aaa_tacacs_server_group_server:
  address: ip(version=4)
  port: int(min=1, max=65535, required=False)
  port_variable: regex('^[^"~`$&+,]{1,255}$', required=False)
  timeout: int(min=1, max=1000, required=False)
  timeout_variable: regex('^[^"~`$&+,]{1,255}$', required=False)
  key: str(starts_with="$CRYPT_CLUSTER$", min=1, max=128) # vManage-encrypted string
  secret_key: regex('^[0-9a-z]{1,150}$') # Type-7 encrypted secret
edge_feature_templates_aaa_user:
  name: str(max=64)
  optional: bool(required=False)
  password: str(starts_with="$6$") # Must be a SHA512 hash
  privilege_level: enum(1, 15, required=False)
  privilege_level_variable: regex('^[^"~`$&+,]{1,255}$', required=False)
  secret: str(starts_with="$9$") # Must be a Cisco Type 9 scrypt hash
  ssh_rsa_keys: list(str(), max=2, required=False)
