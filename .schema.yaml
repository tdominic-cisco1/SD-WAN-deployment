  destination_geo_locations: list(str(max=3), required=False)
  destination_port_lists: list(regex('^[A-Za-z0-9\-_]{1,32}$'), required=False)
  destination_ports: list(int(min=0, max=65535), required=False)
  destination_port_ranges: list(include("security_policy_zone_based_firewall_rules_match_criterias_destination_port_range"), required=False)
